services:
  - type: web
    name: dca-bot
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DEFAULT_COIN
        value: "HYPE"
      - key: DEFAULT_BALANCE
        value: "100.0"
      - key: HL_WALLET_ADDRESS
        sync: false
      - key: HL_PRIVATE_KEY
        sync: false
      - key: QUICKNODE_RPC_URL
        sync: false
